version: '3.8'
services:
  app:
    build: .
    container_name: nest-ssr-todo-app
    ports:
      - '${PORT:-3000}:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/todos
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_TTL_SECONDS=30
    depends_on:
      - mongodb
      - redis
  mongodb:
    image: mongo:7
    container_name: nest-ssr-todo-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
  redis:
    image: redis:7-alpine
    container_name: nest-ssr-todo-redis
    ports:
      - '6379:6379'
    command: ["redis-server", "--appendonly", "yes"]
volumes:
  mongo-data: {}


