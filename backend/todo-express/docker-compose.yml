# Database switching via DB_PROFILE and --profile flag:
#   MongoDB (default):    docker compose --profile mongodb up
#   PostgreSQL:           DB_PROFILE=postgresql docker compose --profile postgresql up

services:
  app:
    build: .
    container_name: todo-express
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DB_PROFILE: ${DB_PROFILE:-mongodb}
      MONGODB_URI: mongodb://mongodb:27017/todos
      POSTGRESQL_URI: postgresql://${POSTGRESQL_USER:-postgres}:${POSTGRESQL_PASSWORD:-postgres}@postgresql:5432/todos
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-30}
    depends_on:
      mongodb:
        condition: service_healthy
        required: false
      postgresql:
        condition: service_healthy
        required: false
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongodb:
    image: mongo:8
    container_name: todo-express-mongo
    profiles: [mongodb]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgresql:
    image: postgres:17-alpine
    container_name: todo-express-postgres
    profiles: [postgresql]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: todos
      POSTGRES_USER: ${POSTGRESQL_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USER:-postgres} -d todos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: todo-express-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

volumes:
  mongo_data:
  postgres_data:
