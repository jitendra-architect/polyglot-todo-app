spring:
  application:
    name: todo-spring

  # ── Database selector ─────────────────────────────────────────────────────
  # Change this (or set DB_PROFILE env var) to switch databases:
  #   mongodb    → connects to MongoDB (default)
  #   postgresql → connects to PostgreSQL
  profiles:
    active: ${DB_PROFILE:mongodb}

  cache:
    type: ${CACHE_TYPE:caffeine}
    caffeine:
      spec: maximumSize=500,expireAfterWrite=${CACHE_TTL_SECONDS:30}s

  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:3001}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  redis:
    enabled: ${REDIS_ENABLED:false}
  cache:
    ttl-seconds: ${CACHE_TTL_SECONDS:30}

logging:
  level:
    com.todo: DEBUG

---
# ── MongoDB profile ───────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: mongodb
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/todos}

  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration
      - org.springframework.boot.data.jpa.autoconfigure.DataJpaRepositoriesAutoConfiguration

logging:
  level:
    org.springframework.data.mongodb: INFO

---
# ── PostgreSQL profile ────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: postgresql

  datasource:
    url: ${POSTGRESQL_URI:jdbc:postgresql://localhost:5432/todos}
    username: ${POSTGRESQL_USER:postgres}
    password: ${POSTGRESQL_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    show-sql: false

  autoconfigure:
    exclude:
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoAutoConfiguration
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoRepositoriesAutoConfiguration

logging:
  level:
    org.springframework.data.jpa: INFO
    org.hibernate.SQL: INFO
